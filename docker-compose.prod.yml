# ============================================================
# docker-compose.prod.yml — production-конфиг
#
# Использует pre-built образ pii-masking:latest (без секции build),
# чтобы compose не пытался пересобирать его в bridge-сети.
# Сборка выполняется отдельно через deploy-prod.sh с --network host.
#
# Использование на сервере:
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  pii-masking:
    image: pii-masking:latest
    container_name: pii-masking
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "${PII_PORT:-6111}:6111"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pii-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6111/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7.2-alpine
    container_name: pii-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pii-net

volumes:
  redis_data:
    driver: local

networks:
  pii-net:
    driver: bridge
