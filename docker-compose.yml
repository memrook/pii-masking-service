# ============================================================
# docker-compose.yml — standalone деплой PII Masking Service
#
# Самостоятельный запуск (без других проектов):
#   docker compose up -d
#
# Сервис будет доступен на http://localhost:6111
# Swagger UI: http://localhost:6111/docs
# ============================================================

services:
  # ----------------------------------------------------------
  # PII Masking Service
  # ----------------------------------------------------------
  pii-masking:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pii-masking
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "${PII_PORT:-6111}:6111"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pii-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6111/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # моделям нужно время на загрузку
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ----------------------------------------------------------
  # Redis — хранилище маппинга сессий
  # ----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: pii-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pii-net

volumes:
  redis_data:
    driver: local

networks:
  pii-net:
    driver: bridge
